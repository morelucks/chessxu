# Codecov configuration
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  # Minimum coverage percentage required for the PR status check to pass
  minimum: 80

  status:
    project:
      default:
        # Block PRs that drop overall project coverage below 80%
        target: 80%
        threshold: 2%
        base: auto
        if_not_found: success
        if_ci_failed: error

    patch:
      default:
        # New code introduced in a PR must be at least 70% covered
        target: 70%
        threshold: 5%
        base: auto
        if_not_found: success
        if_ci_failed: error

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "dist/**"
  - "dist-test/**"
  - "src/simulation.ts"
  - "scripts/**"
  - "tests/**"
  - "**/*.d.ts"
  - "**/*.js.map"
